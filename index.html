<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurama IA</title>
    <style>
        body { background: #0a0a0a; color: #ff4500; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; border: 2px solid #8b0000; background: #111; border-radius: 5px; margin-bottom: 10px; }
        .msg { margin: 10px 0; padding: 8px; border-radius: 4px; line-height: 1.4; word-wrap: break-word; }
        .user { background: #222; color: #fff; border-left: 3px solid #555; }
        .kurama { background: #1a0505; color: #ff5555; border-left: 3px solid #ff0000; }
        .kurama img { max-width: 100%; max-height: 150px; display: block; margin-top: 8px; border-radius: 4px; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; background: #151515; color: #fff; border: 1px solid #8b0000; border-radius: 4px; font-size: 16px; }
        button { padding: 12px 20px; background: #8b0000; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="msg kurama">Humain... Tu oses déranger mon sommeil ? Qui t'a permis de m'adresser la parole ?</div>
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Parle à Kurama...">
        <button onclick="envoyer()">Griffer</button>
    </div>

    <script>
        // Votre URL Hugging Face est intégrée ici
        const HUGGING_FACE_URL = "https://domy3-kurama-alpha-code.hf.space";

        async function envoyer() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div class="msg user"><b>Toi:</b> ${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            try {
                const response = await fetch(`${HUGGING_FACE_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'alpha-code', prompt: text, stream: false })
                });
                
                const data = await response.json();
                let reply = data.response;
                
                const gifRegex = /!\[\]\((.*?)\)/g;
                reply = reply.replace(gifRegex, '<img src="$1" alt="humeur">');
                chat.innerHTML += `<div class="msg kurama"><b>Kurama:</b> ${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg kurama"><b>Système:</b> [Erreur de communication avec le démon]</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
