<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurama AI Terminal</title>
    <style>
        /* Supprime les bordures de la page et force le mode plein écran */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0d; /* Fond dark ChatGPT style */
        }

        /* Conteneur principal pour étirer l'iframe */
        .chat-frame-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Configuration responsive de votre iframe Kurama */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="chat-frame-container">
        <!-- Intégration directe et fluide de votre Space Kurama -->
        <iframe 
            src="https://domy3-kurama-alpha-code.hf.space" 
            frameborder="0">
        </iframe>
    </div>

</body>
</html>
