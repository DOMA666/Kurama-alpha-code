<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurama AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chargement correct des icônes pour les boutons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- Menu latéral déroulant (Historique) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fa-solid fa-scroll"></i> Historique</h3>
            <button id="close-sidebar" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="history-list" class="history-list">
            <!-- Les sessions Supabase chargeront ici -->
        </div>
    </div>

    <!-- Interface principale du Chat -->
    <div class="chat-container">
        <header class="chat-header">
            <button id="open-sidebar" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
            <h1>Kurama <span class="badge">Qwen Uncensored</span></h1>
            <button id="new-chat" class="icon-btn"><i class="fa-solid fa-pen-to-square"></i></button>
        </header>

        <main id="chat-box" class="chat-box">
            <!-- Les bulles de messages apparaîtront ici -->
        </main>

        <footer class="chat-footer">
            <div class="input-area">
                <textarea id="user-input" placeholder="Posez votre question de codage à Kurama..." rows="1"></textarea>
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
